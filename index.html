<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App v2</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
    <div>
        <h1>👤 Student Name</h1>
        <p>Class: 10th</p>
    </div>

    <button id="themeToggle">🌙</button>
</header>

<!-- HOME MENU -->
<section id="homeScreen" class="screen active">

    <h2>📚 Choose what you want to do</h2>

    <div class="menu">

        <button onclick="openSection('homework')">
            📝 Homework
        </button>

        <button onclick="openSection('exams')">
            ⏳ Exams
        </button>

        <button onclick="openSection('marks')">
            📊 Marks
        </button>

        <button onclick="openSection('timetable')">
            📅 Timetable
        </button>

        <button onclick="openSection('goals')">
            🎯 Goals
        </button>

        <button onclick="openSection('reminders')">
            ⏰ Reminders
        </button>

        <button onclick="openSection('streak')">
            🔥 Streak
        </button>

    </div>

</section>

<!-- HOMEWORK SCREEN -->
<section id="homework" class="screen">
    <h2>📝 Homework Tracker</h2>

    <input type="text" placeholder="Title">
    <input type="date">
    <select>
        <option>To Do</option>
        <option>In Progress</option>
        <option>Done</option>
    </select>

    <button>Add Homework</button>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- EXAMS -->
<section id="exams" class="screen">
    <h2>⏳ Exam Countdown</h2>

    <input type="text" placeholder="Exam name">
    <input type="date">

    <button>Add Exam</button>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- MARKS -->
<section id="marks" class="screen">
    <h2>📊 Marks Recorder</h2>

    <input type="text" placeholder="Subject">
    <input type="number" placeholder="Marks">
    <input type="number" placeholder="Total">

    <button>Add Marks</button>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- TIMETABLE -->
<section id="timetable" class="screen">
    <h2>📅 Timetable</h2>

    <input type="text" placeholder="Subject">
    <input type="time">
    <input type="time">

    <button>Add</button>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- GOALS -->
<section id="goals" class="screen">
    <h2>🎯 Goals</h2>

    <input type="text" placeholder="Goal">
    <button>Add</button>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- REMINDERS -->
<section id="reminders" class="screen">
    <h2>⏰ Reminders</h2>

    <input type="text" placeholder="Reminder">
    <input type="datetime-local">

    <button>Add</button>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- STREAK -->
<section id="streak" class="screen">
    <h2>🔥 Study Streak</h2>

    <p>Current: 0</p>
    <p>Best: 0</p>

    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- SCRIPT -->
<script>
function openSection(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goHome(){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('homeScreen').classList.add('active');
}
</script>

</body>
</html>
