<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student App v2</title>

    <link rel="stylesheet" href="style.css">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
    <img src="9627d61c2f84543ade88c42aa6a9cff8.jpg" class="logo">

    <div>
        <h1>Student App</h1>
        <p>Your Study Conpanion</p>
    </div>
</header>

<!-- HOME -->
<section id="home" class="screen active">

    <h2>📚 Dashboard</h2>

    <div class="menu">

        <button onclick="openPage('homework')">📝 Homework</button>
        <button onclick="openPage('exams')">⏳ Exams</button>
        <button onclick="openPage('marks')">📊 Marks</button>
        <button onclick="openPage('timetable')">📅 Timetable</button>
        <button onclick="openPage('goals')">🎯 Goals</button>
        <button onclick="openPage('reminders')">⏰ Reminders</button>
        <button onclick="openPage('streak')">🔥 Streak</button>

    </div>

</section>

<!-- HOMEWORK -->
<section id="homework" class="screen">
    <h2>📝 Homework</h2>

    <input type="text" id="hwTitle" placeholder="Title">
    <input type="date" id="hwDate">

    <select id="hwStatus">
        <option>To Do</option>
        <option>In Progress</option>
        <option>Done</option>
    </select>

    <button onclick="addHomework()">Add</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- EXAMS -->
<section id="exams" class="screen">
    <h2>⏳ Exams</h2>

    <input type="text" id="examName" placeholder="Exam Name">
    <input type="date" id="examDate">

    <button onclick="addExam()">Add</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- MARKS -->
<section id="marks" class="screen">
    <h2>📊 Marks</h2>

    <input type="text" id="subject" placeholder="Subject">
    <input type="number" id="marks" placeholder="Marks">
    <input type="number" id="total" placeholder="Total">

    <button onclick="addMarks()">Add</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- TIMETABLE -->
<section id="timetable" class="screen">
    <h2>📅 Timetable</h2>

    <input type="text" id="sub" placeholder="Subject">
    <input type="time" id="from">
    <input type="time" id="to">

    <button onclick="addTimetable()">Add</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- GOALS -->
<section id="goals" class="screen">
    <h2>🎯 Goals</h2>

    <input type="text" id="goal" placeholder="Goal">

    <button onclick="addGoal()">Add</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- REMINDERS -->
<section id="reminders" class="screen">
    <h2>⏰ Reminders</h2>

    <input type="text" id="reminderText" placeholder="Reminder">
    <input type="datetime-local" id="reminderTime">

    <button onclick="addReminder()">Add</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<!-- STREAK -->
<section id="streak" class="screen">
    <h2>🔥 Streak</h2>

    <p>Current: <span id="streakCount">0</span></p>
    <p>Best: <span id="bestStreak">0</span></p>

    <button onclick="markStudy()">Mark Today Done</button>
    <button onclick="goHome()">⬅ Back</button>
</section>

<script src="script.js"></script>

</body>
</html>
